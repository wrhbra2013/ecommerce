<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor de Preços VTEX</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>📊</text></svg>">
</head>
<body>
<div class="container">
  <h1>Monitor de Preços VTEX</h1>
  <p class="subtitle">Consome a API de catálogo, compara com o snapshot anterior e destaca alterações.</p>

  <form id="searchForm" class="form">
    <div class="form-row">
      <div class="field">
        <label for="domain">Domínio da loja</label>
        <select id="domain">
          <option value="www.americanas.com.br">Americanas</option>
          <option value="www.cobasi.com.br">Cobasi</option>
          <option value="www.tokstok.com.br">Tok&Stok</option>
          <option value="www.rihappy.com.br">Ri Happy</option>
          <option value="www.kopenhagen.com.br">Kopenhagen</option>
          <option value="www.cea.com.br">C&A</option>
          <option value="www.epocacosmeticos.com.br">Época Cosméticos</option>
          <option value="www.paguemenos.com.br">Pague Menos</option>
          <option value="www.drogariasaopaulo.com.br">Drogaria São Paulo</option>
          <option value="www.telhanorte.com.br">Telhanorte</option>
          <option value="www.olympikus.com.br">Olympikus</option>
          <option value="www.bemol.com.br">Bemol</option>
          <option value="www.lojasrede.com.br">Lojas Rede</option>
          <option value="www.santalolla.com.br">Santa Lolla</option>
          <option value="www.aramis.com.br">Aramis</option>
          <option value="www.pandorajoias.com.br">Pandora Joias</option>
          <option value="www.urbanarts.com.br">Urban Arts</option>
        </select>
      </div>
      <div class="field">
        <label for="query">Termo de busca</label>
        <input type="text" id="query" value="notebook" placeholder="ex.: notebook">
      </div>
      <div class="field">
        <label for="limit">Limite</label>
        <input type="number" id="limit" value="20" min="1" max="100">
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" id="btnBuscar">Buscar</button>
      <button type="button" id="btnLimpar" class="btn-sec">Limpar histórico</button>
    </div>
  </form>

  <div id="status" class="status"></div>

  <div id="summary" class="summary" hidden>
    <span id="totalProdutos"></span>
    <span id="alterados" class="badge"></span>
    <span id="primeiraVez" class="badge badge-info"></span>
  </div>

  <div id="results" class="grid"></div>
</div>

<script src="app.js"></script>
</body>
</html>
