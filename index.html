<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor de Preços VTEX</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>📊</text></svg>">
</head>
<body>
<div class="container">
  <h1>Monitor de Preços VTEX</h1>
  <p class="subtitle">Consome a API de catálogo, compara com o snapshot anterior e destaca alterações.</p>

  <form id="searchForm" class="form">
    <div class="form-row">
      <div class="field">
        <label for="domain">Domínio da loja</label>
        <select id="domain"></select>
        <div id="customDomainRow" class="custom-domain" hidden>
          <input type="text" id="customDomain" placeholder="ex.: www.minhaloja.com.br">
        </div>
      </div>
      <div class="field">
        <label for="query">Termo de busca</label>
        <input type="text" id="query" value="notebook" placeholder="ex.: notebook">
      </div>
      <div class="field">
        <label for="limit">Limite</label>
        <input type="number" id="limit" value="5" min="1" max="100">
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" id="btnBuscar">Buscar</button>
      <button type="button" id="btnLimpar" class="btn-sec">Limpar histórico</button>
    </div>
  </form>

  <div id="status" class="status"></div>

  <div id="summary" class="summary" hidden>
    <span id="totalProdutos"></span>
    <span id="alterados" class="badge"></span>
    <span id="primeiraVez" class="badge badge-info"></span>
  </div>

  <div id="results" class="grid"></div>
</div>

<script src="app.js"></script>
</body>
</html>
